<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mailtree Test Forms</title>
</head>
<body>

<h1>Mailtree API Test</h1>

<hr>

<h2>Contact Form</h2>

<form class="mailtree">
    <input name="name" placeholder="Name" required><br><br>

    <input type="email" name="email" placeholder="Email" required><br><br>

    <input name="subject" placeholder="Subject"><br><br>

    <textarea name="message" placeholder="Message"></textarea><br><br>

    <button>Send Contact</button>
</form>

<hr>

<h2>Newsletter</h2>

<form class="mailtree">

    <input
        type="email"
        name="email"
        placeholder="Subscriber Email"
        required>

    <br><br>

    <button>Subscribe</button>

</form>

<hr>

<h2>Login Form</h2>

<form class="mailtree">

    <input
        type="email"
        name="email"
        placeholder="Email"
        required>

    <br><br>

    <input
        type="password"
        name="password"
        placeholder="Password"
        required>

    <br><br>

    <button>Login</button>

</form>

<hr>

<h2>Quote Request</h2>

<form class="mailtree">

    <input
        name="company"
        placeholder="Company Name">

    <br><br>

    <input
        type="email"
        name="email"
        placeholder="Email">

    <br><br>

    <input
        name="budget"
        placeholder="Budget">

    <br><br>

    <textarea
        name="project"
        placeholder="Project Details"></textarea>

    <br><br>

    <button>Request Quote</button>

</form>

<script>

document.querySelectorAll(".mailtree").forEach(form=>{

    form.addEventListener("submit",async(e)=>{

        e.preventDefault();

        const body={};

        form.querySelectorAll("input,textarea,select").forEach(field=>{

            body[field.name]=field.value;

        });

        try{

            const res=await fetch("https://mailtree.vercel.app/send",{

                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                body:JSON.stringify(body)

            });

            alert(await res.text());

            form.reset();

        }

        catch(err){

            alert("Request Failed");

            console.log(err);

        }

    });

});

</script>

</body>
</html>
