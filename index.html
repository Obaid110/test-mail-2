<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mailtree Test Form</title>
    <style>
        body {
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f5f5f5;
        }

        form {
            background: #fff;
            padding: 25px;
            border-radius: 10px;
            width: 420px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }

        input, textarea, select {
            width: 100%;
            margin-bottom: 10px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: black;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 15px;
        }

        button:hover {
            background: #333;
        }

        h3 {
            margin-bottom: 10px;
        }

        .note {
            font-size: 12px;
            color: gray;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<form data-mailtree="true">
    <h3>Mailtree Test Form</h3>
    <div class="note">This form is used for testing SMTP + dynamic field handling</div>

    <!-- SMTP test fields -->
    <input type="text" name="host" placeholder="SMTP Host (e.g. smtp.gmail.com)" required>
    <input type="number" name="port" placeholder="Port (465 / 587)" required>
    <input type="text" name="username" placeholder="SMTP Username" required>
    <input type="password" name="password" placeholder="SMTP Password" required>

    <hr>

    <!-- Dynamic extra fields -->
    <input type="text" name="name" placeholder="Full Name">
    <input type="email" name="email" placeholder="Email Address">
    <input type="text" name="phone" placeholder="Phone Number">
    <input type="text" name="company" placeholder="Company / Organization">
    <input type="text" name="subject" placeholder="Subject">

    <select name="service">
        <option value="">Select Service</option>
        <option value="web development">Web Development</option>
        <option value="seo">SEO</option>
        <option value="ai integration">AI Integration</option>
        <option value="support">Support</option>
    </select>

    <input type="text" name="budget" placeholder="Budget">
    <input type="text" name="country" placeholder="Country">

    <textarea name="message" placeholder="Message" rows="5"></textarea>

    <button type="submit">Send Test Email</button>
</form>

<script src="https://mailtree.vercel.app/mailtree.js"></script>

</body>
</html>
