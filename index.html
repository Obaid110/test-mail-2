<form id="newsForm">
  <h3>Join Newsletter</h3>
  <input type="email" id="subscriber" placeholder="Enter your email" required>
  <button type="submit">Subscribe</button>
  <p id="msg"></p>
</form>

<style>
  form { max-width: 320px; margin: 40px auto; padding: 20px; border: 1px solid #ddd; border-radius: 12px; }
  input, button { width: 100%; padding: 12px; margin-top: 10px; box-sizing: border-box; }
  button { background: #111827; color: white; border: 0; border-radius: 8px; }
</style>

<script>
document.getElementById("newsForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const subscriber = document.getElementById("subscriber").value;

  try {
    const res = await fetch("https://mailtree.vercel.app/send", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        to: "motech508@gmail.com",
        subject: "New Newsletter Subscriber",
        text: "New subscriber: " + subscriber
      })
    });

    const data = await res.text(); // safe
    document.getElementById("msg").innerText = data;

  } catch (err) {
    console.log(err);
    document.getElementById("msg").innerText = "Request failed";
  }
});
</script>
