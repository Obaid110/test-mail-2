<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mailtree Advanced Form</title>
    <style>
        body {
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f5f5f5;
        }

        form {
            background: #fff;
            padding: 25px;
            border-radius: 10px;
            width: 400px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }

        input, textarea, select {
            width: 100%;
            margin-bottom: 10px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: black;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 15px;
        }

        button:hover {
            background: #333;
        }

        h3 {
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<form data-mailtree="true">
    <h3>Contact / Lead Form</h3>

    <input type="text" name="name" placeholder="Full Name" required>

    <input type="email" name="email" placeholder="Email Address" required>

    <input type="text" name="phone" placeholder="Phone Number">

    <input type="text" name="company" placeholder="Company / Organization">

    <input type="text" name="subject" placeholder="Subject">

    <select name="service">
        <option value="">Select Service</option>
        <option value="web development">Web Development</option>
        <option value="seo">SEO</option>
        <option value="ai integration">AI Integration</option>
        <option value="support">Support</option>
    </select>

    <input type="text" name="budget" placeholder="Estimated Budget">

    <input type="text" name="country" placeholder="Country">

    <textarea name="message" placeholder="Write your message..." rows="5" required></textarea>

    <button type="submit">Send Message</button>
</form>

<script src="https://mailtree.vercel.app/mailtree.js"></script>

</body>
</html>
